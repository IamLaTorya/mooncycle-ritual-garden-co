<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooncycle Ritual Garden Co. | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Mooncycle Ritual Garden Co.</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="catalog.html">Catalog</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <!-- <div class="hero-content"> -->
            <h1>Reach Out Beneath the Moonlight</h1>
            <p>We’re here to listen, connect, and grow with you.</p>
        </div>
    </section>

    <main class="container">

        <!-- Contact Form -->
        <section class="contact-section">
            <h2>Get in Touch</h2>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="date">Date</label>
                <input type="date" id="date" name="date">

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>

    </main>

    <!-- Footer -->
    <footer class="footer-inline">
        <span class="footer-brand">Mooncycle Ritual Garden Co.</span>
        <span class="footer-divider">•</span>
        <span class="footer-location">Tupelo, Mississippi</span>
        <span class="footer-divider">•</span>
        <div class="footer-social-inline">
            <a href="#">Instagram</a>
            <a href="#">TikTok</a>
            <a href="#">Pinterest</a>
        </div>
        <a href="privacy.html">Privacy Policy</a>
    </footer>


</body>

</html>
